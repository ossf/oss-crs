##############################################################################
#                        CRS Compose Configuration                           #
#              Example for crs-codex-old-cli (bug-fixing, old CLI)           #
##############################################################################

# --- General Settings -------------------------------------------------------
run_env: local
docker_registry: local

# --- Infrastructure ---------------------------------------------------------
oss_crs_infra:
  cpuset: "0-1"
  memory: "8G"

# --- CRS (crs-codex-old-cli) -----------------------------------------------
# Same upstream as crs-codex, but pinned to an older Codex CLI
# (0.47.0, released 2025-10-17) for A/B comparison.
crs-codex-old-cli:
  cpuset: "2-7"
  memory: "16G"
  llm_budget: 10
  additional_env:
    # Override CRS defaults here.
    # Codex models (canonical IDs):
    #   gpt-5-codex, gpt-5.1-codex, gpt-5.1-codex-mini, gpt-5.2-codex
    CRS_AGENT: codex
    CODEX_MODEL: gpt-5.4
    CODEX_CLI_VERSION: 0.47.0
    # AGENT_TIMEOUT: "3600"                          # Optional: seconds, 0 = no limit (default)

# --- LLM Configuration -----------------------------------------------------
llm_config:
  litellm:
    mode: internal
    internal:
      config_path: ./example/crs-codex-old-cli/litellm-config.yaml
