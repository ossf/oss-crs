# LiteLLM proxy config for crs-bug-finding-template (internal mode).
# Model names here must cover crs.yaml's required_llms. Provider keys are
# pulled from the environment at runtime via os.environ/<VAR>.
# See: https://docs.litellm.ai/docs/proxy/configs
model_list:
  - model_name: claude-opus-4-8
    litellm_params:
      model: anthropic/claude-opus-4-8
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-haiku-4-5-20251001
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY
