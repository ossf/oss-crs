##############################################################################
#                        CRS Compose Configuration                           #
#           Example for crs-harness-gen-claude-code (harness-gen)           #
##############################################################################

# --- General Settings -------------------------------------------------------
run_env: local
docker_registry: local

# --- Infrastructure ---------------------------------------------------------
oss_crs_infra:
  cpuset: "0-1"
  memory: "8G"

# --- CRS (crs-harness-gen-claude-code) -------------------------------------
# Builder sidecars are declared in crs.yaml and handled automatically by the
# framework — no separate entry needed.
crs-harness-gen-claude-code:
  cpuset: "2-7"
  memory: "16G"
  llm_budget: 10
  additional_env:
    # Override CRS defaults here. Available models:
    #   claude-opus-4-6, claude-opus-4-5-20251101, claude-opus-4-1-20250805,
    #   claude-sonnet-4-5-20250929, claude-sonnet-4-20250514, claude-haiku-4-5-20251001
    CRS_AGENT: claude_code
    ANTHROPIC_MODEL: claude-opus-4-8
    CLAUDE_CODE_OAUTH_TOKEN: "${CLAUDE_CODE_OAUTH_TOKEN}"  # Optional: set to use OAuth instead of OSS-CRS LLM proxy
    # CLAUDE_CODE_SUBAGENT_MODEL: claude-sonnet-4-5-20250929
    # ANTHROPIC_DEFAULT_OPUS_MODEL: claude-sonnet-4-5-20250929
    # ANTHROPIC_DEFAULT_SONNET_MODEL: claude-sonnet-4-5-20250929
    # ANTHROPIC_DEFAULT_HAIKU_MODEL: claude-sonnet-4-5-20250929
    # AGENT_TIMEOUT: "3600"                          # Optional: seconds, 0 = no limit (default)
