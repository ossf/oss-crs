name: builder-sidecar-fuzz-proj
type:
  - harness-gen
version: 1.0.0
docker_registry: local

target_build_phase:
  - name: default-build
    dockerfile: oss-crs/builder.Dockerfile
    outputs:
      - build
      - src

crs_run_phase:
  fuzz-patcher:
    dockerfile: oss-crs/fuzz_patcher.Dockerfile

supported_target:
  mode:
    - full
  language:
    - c
    - c++
  sanitizer:
    - address
  architecture:
    - x86_64
